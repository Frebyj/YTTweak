name: Build YouTube Tweak IPA

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "Direct URL to a decrypted YouTube IPA"
        required: true
        type: string

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download YouTube IPA
        run: curl -L "${{ github.event.inputs.ipa_url }}" -o YouTube.ipa

      - name: Extract IPA
        run: unzip -q YouTube.ipa -d extracted_ipa

      - name: Repackage IPA
        run: |
          cd extracted_ipa
          zip -qr ../YouTubeTweak.ipa Payload
          cd ..
          ls -lh YouTubeTweak.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v3
        with:
          name: YouTubeTweak
          path: YouTubeTweak.ipa
          retention-days: 7
